<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Syllabus Chatbot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .header p {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }

    /* Input */
    textarea {
      width: 100%;
      background-color: #2e2e2e;
      color: #e0e0e0;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea::placeholder {
      color: #666;
    }

    textarea:focus {
      border-color: #666;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    button {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
    }

    button:hover {
      opacity: 0.85;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background-color: #4a4a4a;
      color: #000000;
      border: none;
    }

    .btn-secondary {
      background-color: transparent;
      color: #888;
      border: 1px solid #555;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #2e2e2e;
    }

    /* Result */
    .result {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .result.visible {
      display: flex;
    }

    .answer-box {
      background-color: #222;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .answer-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 10px;
    }

    .answer-text {
      font-size: 16px;
      line-height: 1.7;
      color: #ffffff;
    }

    .reasoning-text {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: #777;
      font-style: italic;
    }

    /* References */
    .references-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .references-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
    }

    .reference-card {
      background-color: #222;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 14px 18px;
    }

    .reference-source {
      font-size: 13px;
      font-weight: 600;
      color: #bbb;
      margin-bottom: 4px;
    }

    .reference-excerpt {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    /* Markdown rendered content */
    .answer-text h1, .answer-text h2, .answer-text h3 {
      color: #ccc;
      margin: 12px 0 6px;
      font-size: 15px;
    }
    .answer-text p { margin: 6px 0; }
    .answer-text ul, .answer-text ol { padding-left: 20px; margin: 6px 0; }
    .answer-text li { margin: 3px 0; }
    .answer-text strong { color: #ddd; }
    .answer-text hr { border-color: #333; margin: 10px 0; }
    .answer-text code { background: #2a2a2a; padding: 1px 5px; border-radius: 4px; font-size: 13px; }

    /* Markdown tables */
    .answer-text table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .answer-text th { background: #2a2a2a; color: #ccc; font-weight: 600; padding: 8px 12px; border: 1px solid #3a3a3a; text-align: left; }
    .answer-text td { padding: 7px 12px; border: 1px solid #2e2e2e; color: #bbb; vertical-align: top; }
    .answer-text tr:nth-child(even) td { background: #1e1e1e; }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #555;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }

    .spinner.visible {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn-primary-inner {
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Exam Syllabus Chatbot</h1>
      <p>Ask questions from your exam syllabus materials</p>
    </div>

    <!-- Input -->
    <textarea id="question" placeholder="Ask a question from the lecture materials..."></textarea>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn-secondary" onclick="reset()">Reset</button>
      <button class="btn-primary" id="findBtn" onclick="findAnswer()">
        <span class="btn-primary-inner">
          <span id="btnText">Find Answer</span>
          <span class="spinner" id="spinner"></span>
        </span>
      </button>
    </div>

    <hr class="divider" />

    <!-- Result -->
    <div class="result" id="result">

      <!-- Answer + Reasoning -->
      <div class="answer-box">
        <div class="answer-label">Answer</div>
        <div class="answer-text" id="answerText"></div>
        <div class="reasoning-text" id="reasoningText"></div>
      </div>

      <!-- References -->
      <div class="references-section" id="referencesSection"></div>

    </div>

  </div>

  <script>
    const API_URL = "https://chat-uri.execute-api.us-east-1.amazonaws.com/v1/chat";
    const API_KEY = "EXAM_PREPERATION_KEY";

    async function findAnswer() {
      const question = document.getElementById("question").value.trim();
      if (!question) return;

      setLoading(true);
      hideResult();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": API_KEY,
          },
          body: JSON.stringify({ question }),
        });

        const data = await res.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        renderResult(data);

      } catch (err) {
        showError("Failed to reach the API. Please try again.");
      } finally {
        setLoading(false);
      }
    }

    const KATEX_OPTS = {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    };

    function renderMarkdownMath(el, text) {
      // Extract math blocks before marked processes them (marked mangles backslashes)
      const mathBlocks = [];
      const placeholder = (i) => `MATHBLOCK_${i}_END`;

      // Protect display math \[...\] and $$...$$
      let protected_text = text
        .replace(/\$\$([\s\S]+?)\$\$/g, (_, math) => {
          mathBlocks.push({ display: true, math });
          return placeholder(mathBlocks.length - 1);
        })
        .replace(/\\\[([\s\S]+?)\\\]/g, (_, math) => {
          mathBlocks.push({ display: true, math });
          return placeholder(mathBlocks.length - 1);
        })
        // Protect inline math \(...\) and $...$
        .replace(/\\\(([\s\S]+?)\\\)/g, (_, math) => {
          mathBlocks.push({ display: false, math });
          return placeholder(mathBlocks.length - 1);
        })
        .replace(/\$([^\$\n]+?)\$/g, (_, math) => {
          mathBlocks.push({ display: false, math });
          return placeholder(mathBlocks.length - 1);
        });

      // Run marked on the protected text
      el.innerHTML = marked.parse(protected_text);

      // Restore math blocks and render with KaTeX
      mathBlocks.forEach((block, i) => {
        el.innerHTML = el.innerHTML.replace(
          placeholder(i),
          katex.renderToString(block.math, { displayMode: block.display, throwOnError: false })
        );
      });
    }

    function renderResult(data) {
      renderMarkdownMath(document.getElementById("answerText"), data.answer || "");

      const reasoningEl = document.getElementById("reasoningText");
      if (data.reasoning) {
        renderMarkdownMath(reasoningEl, data.reasoning);
        reasoningEl.style.display = "block";
      } else {
        reasoningEl.style.display = "none";
      }

      const refsSection = document.getElementById("referencesSection");
      refsSection.innerHTML = "";

      if (data.references && data.references.length > 0) {
        const label = document.createElement("div");
        label.className = "references-label";
        label.textContent = "References";
        refsSection.appendChild(label);

        data.references.forEach(ref => {
          const card = document.createElement("div");
          card.className = "reference-card";
          const sourceEl = document.createElement("div");
          sourceEl.className = "reference-source";
          sourceEl.textContent = ref.source;
          const excerptEl = document.createElement("div");
          excerptEl.className = "reference-excerpt";
          renderMarkdownMath(excerptEl, ref.excerpt);
          card.appendChild(sourceEl);
          card.appendChild(excerptEl);
          refsSection.appendChild(card);
        });
      }

      document.getElementById("result").classList.add("visible");
    }

    function showError(msg) {
      document.getElementById("answerText").textContent = msg;
      document.getElementById("reasoningText").style.display = "none";
      document.getElementById("referencesSection").innerHTML = "";
      document.getElementById("result").classList.add("visible");
    }

    function hideResult() {
      document.getElementById("result").classList.remove("visible");
    }

    function reset() {
      document.getElementById("question").value = "";
      hideResult();
      document.getElementById("answerText").textContent = "";
      document.getElementById("reasoningText").textContent = "";
      document.getElementById("referencesSection").innerHTML = "";
    }

    function setLoading(loading) {
      const btn = document.getElementById("findBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      btn.disabled = loading;
      spinner.className = loading ? "spinner visible" : "spinner";
      btnText.textContent = loading ? "Searching..." : "Find Answer";
    }

    // Allow Enter key (Ctrl+Enter) to submit
    document.getElementById("question").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) findAnswer();
    });
  </script>
</body>

</html>
