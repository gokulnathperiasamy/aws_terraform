<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Syllabus Chatbot — Local Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f5f5f5;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .test-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #856404;
      text-align: center;
    }

    textarea {
      width: 100%;
      background-color: #ffffff;
      color: #1a1a1a;
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea::placeholder { color: #aaa; }
    textarea:focus { border-color: #888; }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    button {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background-color: #1a1a1a; color: #ffffff; border: none; }
    .btn-secondary { background-color: transparent; color: #555; border: 1px solid #bbb; }

    .divider { border: none; border-top: 1px solid #e0e0e0; }

    .result { display: none; flex-direction: column; gap: 16px; }
    .result.visible { display: flex; }

    .answer-box {
      background-color: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .answer-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin-bottom: 10px;
    }

    .answer-text { font-size: 16px; line-height: 1.7; color: #1a1a1a; }

    .reasoning-text {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: #888;
      font-style: italic;
    }

    .references-section { display: flex; flex-direction: column; gap: 10px; }

    .references-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
    }

    .reference-card {
      background-color: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 18px;
    }

    .reference-source { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; }
    .reference-excerpt { font-size: 12px; color: #888; line-height: 1.5; }

    /* Markdown */
    .answer-text h1, .answer-text h2, .answer-text h3 { color: #222; margin: 12px 0 6px; font-size: 15px; }
    .answer-text p { margin: 6px 0; }
    .answer-text ul, .answer-text ol { padding-left: 20px; margin: 6px 0; }
    .answer-text li { margin: 3px 0; }
    .answer-text strong { color: #111; }
    .answer-text hr { border-color: #e0e0e0; margin: 10px 0; }
    .answer-text code { background: #f0f0f0; color: #333; padding: 1px 5px; border-radius: 4px; font-size: 13px; }

    /* Tables */
    .answer-text table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .answer-text th { background: #f0f0f0; color: #333; font-weight: 600; padding: 8px 12px; border: 1px solid #ddd; text-align: left; }
    .answer-text td { padding: 7px 12px; border: 1px solid #e8e8e8; color: #444; vertical-align: top; }
    .answer-text tr:nth-child(even) td { background: #fafafa; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }

    .spinner.visible { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-primary-inner { display: flex; align-items: center; gap: 8px; }
  </style>
</head>

<body>
  <div class="container">

    <div class="test-banner">⚠️ Local test mode — using mock response, no API calls made</div>

    <textarea id="question" placeholder="Ask a question from the lecture materials..."></textarea>

    <div class="actions">
      <button class="btn-secondary" onclick="reset()">Reset</button>
      <button class="btn-primary" id="findBtn" onclick="findAnswer()">
        <span class="btn-primary-inner">
          <span id="btnText">Search</span>
          <span class="spinner" id="spinner"></span>
        </span>
      </button>
    </div>

    <hr class="divider" />

    <div class="result" id="result">
      <div class="answer-box">
        <div class="answer-label">Answer</div>
        <div class="answer-text" id="answerText"></div>
        <div class="reasoning-text" id="reasoningText"></div>
      </div>
      <div class="references-section" id="referencesSection"></div>
    </div>

  </div>

  <script>
    const MOCK_RESPONSE = {
      answer: `**Grover's Search Algorithm** finds a marked item among $N$ items using only $O(\\sqrt{N})$ oracle calls — a quadratic speedup over classical $O(N)$ search.

---

### Steps

| Step | Action | Formula |
|------|--------|---------|
| 1 | Prepare uniform superposition | $|\\psi\\rangle = H^{\\otimes n}|0\\rangle^{\\otimes n} = \\frac{1}{\\sqrt{N}}\\sum_{x=0}^{N-1}|x\\rangle$ |
| 2 | Oracle call | $O|x\\rangle = (-1)^{f(x)}|x\\rangle$ |
| 3 | Diffusion operator | $D = 2|\\psi\\rangle\\langle\\psi| - I$ |
| 4 | Grover iteration | $G = D \\cdot O$ |
| 5 | Repeat $R$ times | $R \\approx \\frac{\\pi}{4}\\sqrt{\\frac{N}{M}}$ |
| 6 | Measure | Yields marked item with probability $\\geq 1 - \\frac{M}{N}$ |

---

### Geometric Picture

Each application of $G$ rotates the state vector by angle $\\theta$ in the subspace spanned by $|\\alpha\\rangle$ (unmarked) and $|\\beta\\rangle$ (marked):

$$G^k|\\psi\\rangle = \\cos\\!\\left(\\frac{2k+1}{2}\\theta\\right)|\\alpha\\rangle + \\sin\\!\\left(\\frac{2k+1}{2}\\theta\\right)|\\beta\\rangle$$

where $\\sin\\theta = 2\\sqrt{M(N-M)}/N$.

For $M \\ll N$, the optimal number of iterations is:

$$R = \\operatorname{CI}\\!\\left(\\frac{\\arccos\\sqrt{M/N}}{\\theta}\\right)$$`,

      reasoning: "The context from Chapter 6 clearly describes the Grover iteration, geometric picture, and the quadratic speedup. The formula for R comes from Eq.(6.15).",

      references: [
        {
          source: "Quantum-Computing-Chapter6",
          excerpt: "The amplitude after $k$ Grover iterations satisfies $\\langle x_0 | \\psi_k \\rangle \\approx \\sin((2k+1)\\theta)$, where $\\sin\\theta = 2\\sqrt{M(N-M)}/N$ (Eq. 6.12)."
        },
        {
          source: "Quantum-Computing-Chapter7",
          excerpt: "In the NMR implementation, the Grover iteration for a 2-qubit system is $G = H^{\\otimes 2} P H^{\\otimes 2} O$ where $P = 2|0\\rangle\\langle 0| - I$ (Eq. 7.172)."
        }
      ]
    };

    function findAnswer() {
      const question = document.getElementById("question").value.trim();
      if (!question) return;

      setLoading(true);
      hideResult();

      setTimeout(() => {
        renderResult(MOCK_RESPONSE);
        setLoading(false);
      }, 800);
    }

    function renderMarkdownMath(el, text) {
      const mathBlocks = [];
      const placeholder = (i) => `MATHBLOCK_${i}_END`;

      let protected_text = text
        .replace(/\$\$([\s\S]+?)\$\$/g, (_, math) => {
          mathBlocks.push({ display: true, math });
          return placeholder(mathBlocks.length - 1);
        })
        .replace(/\\\[([\s\S]+?)\\\]/g, (_, math) => {
          mathBlocks.push({ display: true, math });
          return placeholder(mathBlocks.length - 1);
        })
        .replace(/\\\(([\s\S]+?)\\\)/g, (_, math) => {
          mathBlocks.push({ display: false, math });
          return placeholder(mathBlocks.length - 1);
        })
        .replace(/\$([^\$\n]+?)\$/g, (_, math) => {
          mathBlocks.push({ display: false, math });
          return placeholder(mathBlocks.length - 1);
        });

      el.innerHTML = marked.parse(protected_text);

      mathBlocks.forEach((block, i) => {
        el.innerHTML = el.innerHTML.replace(
          placeholder(i),
          katex.renderToString(block.math, { displayMode: block.display, throwOnError: false })
        );
      });
    }

    function renderResult(data) {
      renderMarkdownMath(document.getElementById("answerText"), data.answer || "");

      const reasoningEl = document.getElementById("reasoningText");
      if (data.reasoning) {
        renderMarkdownMath(reasoningEl, data.reasoning);
        reasoningEl.style.display = "block";
      } else {
        reasoningEl.style.display = "none";
      }

      const refsSection = document.getElementById("referencesSection");
      refsSection.innerHTML = "";

      if (data.references && data.references.length > 0) {
        const label = document.createElement("div");
        label.className = "references-label";
        label.textContent = "References";
        refsSection.appendChild(label);

        data.references.forEach(ref => {
          const card = document.createElement("div");
          card.className = "reference-card";
          const sourceEl = document.createElement("div");
          sourceEl.className = "reference-source";
          sourceEl.textContent = ref.source;
          const excerptEl = document.createElement("div");
          excerptEl.className = "reference-excerpt";
          excerptEl.textContent = ref.excerpt.replace(/[\s\S]{80}[^.!?]*[.!?]?[\s\S]*/g, m => m.slice(0, 120) + "…");
          card.appendChild(sourceEl);
          card.appendChild(excerptEl);
          refsSection.appendChild(card);
        });
      }

      document.getElementById("result").classList.add("visible");
    }

    function hideResult() {
      document.getElementById("result").classList.remove("visible");
    }

    function reset() {
      document.getElementById("question").value = "";
      hideResult();
      document.getElementById("answerText").textContent = "";
      document.getElementById("reasoningText").textContent = "";
      document.getElementById("referencesSection").innerHTML = "";
    }

    function setLoading(loading) {
      const btn = document.getElementById("findBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      btn.disabled = loading;
      spinner.className = loading ? "spinner visible" : "spinner";
      btnText.textContent = loading ? "Searching..." : "Search";
    }

    document.getElementById("question").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) findAnswer();
    });
  </script>
</body>

</html>
